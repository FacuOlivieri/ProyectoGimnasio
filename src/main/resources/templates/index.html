<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit | Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-dark">

<div class="container-registro">
    <div class="form-card">

        <div class="form-header">
            <h2 class="gym-brand">GYMFIT</h2>
            <p style="margin-top: 10px; color: #94a3b8; font-size: 0.9rem;">
                Superá tus límites. Iniciá sesión para entrenar.
            </p>
        </div>

        <form th:action="@{/login}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="form-group">
                <label for="username">Nombre de Usuario o Email</label>
                <input type="text" id="username" name="username" required placeholder="ejemplo123">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-gym">
                Ingresar
            </button>
        </form>

        <div class="form-footer">
            <p>¿Sos nuevo? <a th:href="@{/registro}">Crear una cuenta</a></p>
        </div>

    </div>
</div>

</body>
</html>
