<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit | Crear Cuenta</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>

<main class="contenedor-registro">
    <div class="tarjeta-formulario">

        <div class="encabezado-formulario">
            <h2 class="marca-gimnasio">CREAR CUENTA</h2>
            <p>Completa tus datos para registrar un nuevo perfil en el sistema</p>
        </div>

        <form th:action="@{/registroUsuario}" th:object="${usuario}" method="POST" class="cuadricula-formulario">

            <div class="grupo-formulario">
                <label for="nombre">Nombre</label>
                <input type="text" th:field="*{nombre}" id="nombre" name="nombre" placeholder="Ej: Juan" required>
            </div>

            <div class="grupo-formulario">
                <label for="apellido">Apellido</label>
                <input type="text" th:field="*{apellido}" id="apellido" name="apellido" placeholder="Ej: Pérez" required>
            </div>

            <div class="grupo-formulario">
                <label for="edad">Edad</label>
                <input type="number" th:field="*{edad}" id="edad" name="edad" placeholder="Ej: 25" min="12" required>
            </div>

            <div class="grupo-formulario">
                <label for="telefono">Teléfono</label>
                <input type="text" th:field="*{telefono}" id="telefono" name="telefono" placeholder="Ej: 1112345678">
            </div>

            <div class="grupo-formulario columna-completa">
                <label for="email">Email</label>
                <input type="email" th:field="*{email}" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="grupo-formulario columna-completa">
                <label for="direccion">Dirección</label>
                <input type="text" th:field="*{direccion}" id="direccion" name="direccion" placeholder="Calle Falsa 123">
            </div>

            <div class="grupo-formulario">
                <label for="password">Contraseña</label>
                <input type="password" th:field="*{password}" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="grupo-formulario">
                <label for="repetirPassword">Repetir Contraseña</label>
                <input type="password" id="repetirPassword" name="repetirPassword" placeholder="••••••••" required>
            </div>

            <div class="columna-completa">
                <button type="submit" class="boton-gimnasio">Registrar Usuario</button>
            </div>

        </form>

        <div class="pie-formulario">
            <p>¿Ya tienes cuenta? <a th:href="@{/login}">Volver al Login</a></p>
        </div>

    </div>
</main>


</body>
</html>
