<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFit | Registro de Usuario</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-dark">

<div class="container-registro">
    <div class="form-card">

        <div class="form-header">
            <h2 class="gym-brand">UNITE AL CLUB</h2>
            <p style="margin-top: 10px; color: #94a3b8; font-size: 0.9rem;">
                Completá tus datos para empezar a entrenar
            </p>
        </div>

        <form th:action="@{/registro}" th:object="${usuarioDTO}" method="POST" class="grid-form">

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" th:field="*{nombre}" id="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" th:field="*{apellido}" id="apellido" placeholder="Tu apellido" required>
            </div>

            <div class="form-group">
                <label for="edad">Edad</label>
                <input type="number" th:field="*{edad}" id="edad" placeholder="00" min="12" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" th:field="*{telefono}" id="telefono" placeholder="11 1234 5678">
            </div>

            <div class="form-group col-full">
                <label for="email">Email</label>
                <input type="email" th:field="*{email}" id="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group col-full">
                <label for="direccion">Dirección</label>
                <input type="text" th:field="*{direccion}" id="direccion" placeholder="Calle Falsa 123">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" th:field="*{password}" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="rol">Tipo de Socio</label>
                <select th:field="*{rol}" id="rol">
                    <option value="CLIENTE">Cliente Standard</option>
                    <option value="VIP">Cliente VIP</option>
                    <option value="ENTRENADOR">Entrenador</option>
                </select>
            </div>

            <div class="col-full">
                <button type="submit" class="btn-gym">Registrarme ahora</button>
            </div>

        </form>

        <div class="form-footer">
            <p>¿Ya tenés cuenta? <a th:href="@{/login}">Iniciá sesión aquí</a></p>
        </div>

    </div>
</div>

</body>
</html>
